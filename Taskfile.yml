version: '3'

tasks:
  default:
    cmds: 
      - task --list
      - task up
      - task lint
      - task test
    silent: true

  # ============================================================================
  # MAIN WORKFLOW
  # ============================================================================
  run:
    desc: "Run the full workflow (Production Mode)"
    aliases: [r]
    cmds: ["bun --env-file=config/.env src/index.ts {{.CLI_ARGS}}"]

  run:cached:
    desc: "Run full workflow using cached LLM outputs (WARNING: May Publish)"
    cmds: ["SKIP_LLM=true bun --env-file=config/.env src/index.ts {{.CLI_ARGS}}"]

  # ============================================================================
  # UNIT STEPS
  # ============================================================================
  research:
    desc: "Run research step only"
    cmds: ["bun --env-file=config/.env src/step.ts research {{.CLI_ARGS}}"]

  content:
    desc: "Run content step only"
    cmds: ["bun --env-file=config/.env src/step.ts content {{.CLI_ARGS}}"]

  media:
    desc: "Run media step only"
    cmds: ["bun --env-file=config/.env src/step.ts media {{.CLI_ARGS}}"]

  publish:
    desc: "Run publish step only (REAL PUBLISH)"
    cmds: ["bun --env-file=config/.env src/step.ts publish {{.CLI_ARGS}}"]

  report:
    desc: "Generate full executive report (Macro, Fundamental, Risk, Event, Whale)"
    cmds: ["bun --env-file=config/.env src/report_workflow.ts {{.CLI_ARGS}}"]

  notebooklm:
    desc: "Run NotebookLM workflow: create, generate, download, and publish"
    cmds: ["bun --env-file=config/.env src/notebooklm_workflow.ts {{.CLI_ARGS}}"]

  publish:nlm:
    desc: "Batch publish existing videos in runs-nlm/ to YouTube"
    cmds: ["bun --env-file=config/.env src/scripts/post_nlm_videos.ts"]

  pulse:auto:
    desc: "Run full Daily Pulse to NotebookLM automation"
    cmds: ["bun --env-file=config/.env src/pulse_to_video_workflow.ts"]

  notebooklm:boj:
    desc: "Autonomous BoJ output gap revision analysis workflow"
    cmds: ["bun --env-file=config/.env src/boj_workflow.ts"]

  # ============================================================================
  # INFRASTRUCTURE
  # ============================================================================
  up:
    desc: "Start background services (Voicevox, Aim, Discord Bot)"
    cmds:
      - docker rm -f voicevox-nemo || true
      - docker run -d --name voicevox-nemo --restart unless-stopped -p 50121:50021 voicevox/voicevox_engine:cpu-ubuntu20.04-latest
      - systemctl --user start yt3-aim.service
      - systemctl --user start yt3-discord.service

  down:
    desc: "Stop all background services"
    cmds:
      - docker stop voicevox-nemo || true
      - systemctl --user stop yt3-aim.service || true
      - systemctl --user stop yt3-discord.service || true

  status:
    desc: "Check status of background services"
    aliases: [s]
    cmds:
      - systemctl --user status yt3-aim.service --no-pager || true
      - systemctl --user status yt3-discord.service --no-pager || true
      - docker ps | grep voicevox-nemo || true

  bootstrap:
    desc: "Install dependencies and setup environment"
    cmds:
      - bun install
      - task up

  serve:
    desc: "Start the HTMX Dashboard to monitor runs"
    cmds: ["bun src/dashboard/server.ts"]

  # ============================================================================
  # UTILITIES
  # ============================================================================
  lint:
    desc: "Type-check and Lint"
    aliases: [l]
    cmds:
      - npx tsc --noEmit
      - bun biome check src

  test:
    desc: "Run unit tests (bun test)"
    aliases: [t]
    cmds: ["SKIP_LLM=true bun test"]

  audit:overlays:
    desc: "Audit video overlays"
    cmds: ["bun src/io/utils/qa/audit_overlays.ts"]

  cron:
    desc: "Install cron jobs based on config (Legacy)"
    cmds: ["bun src/io/utils/infra/automation.ts --install-cron"]

  systemd:setup:
    desc: "Install Systemd service and timer"
    cmds: ["bun src/io/utils/infra/setup_systemd.ts"]

  # ============================================================================
  # ACE Intelligence (OpenCE)
  # ============================================================================
  ace:evaluate:
    desc: "Analyze logs and evolve playbook (Closed-Loop)"
    cmds: ["bun --env-file=config/.env src/domain/ace/ops.ts evaluate"]

  ace:acquire:
    desc: "Acquire new orthogonal strategic hypotheses"
    cmds: ["bun --env-file=config/.env src/domain/ace/ops.ts acquire"]

  monitor:watch:
    desc: "Run the watcher agent manually"
    cmds: ["bun src/agents/watcher.ts {{.CLI_ARGS}}"]

  # ============================================================================
  # HARNESS MAINTENANCE
  # ============================================================================
  adr:new:
    desc: "Create a new ADR"
    cmds: ["bun scripts/adr_new.ts {{.title}}"]

  harness:doctor:
    desc: "Scan for repository rot (stale docs, dummy tests)"
    cmds: ["bun scripts/harness_doctor.ts"]

  # ============================================================================
  # CONTEXT
  # ============================================================================
  copcon:
    desc: "Generate codebase context report with copcon (output: copcon/context.md)"
    cmds:
      - mkdir -p copcon
      - uv run copcon . --output-file copcon/context.md {{.CLI_ARGS}}
