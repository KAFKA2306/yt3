global_style:
  font_path: "assets/fonts/Atkinson-Hyperlegible-Regular.ttf"
  font_name: "Atkinson Hyperlegible"
  thumbnail:
    title_size: 110
    subtitle_size: 48
  video:
    subtitle_size: 64

workflow:
  default_run_dir: "runs"
  default_bucket: "daily_pulse"
  checkpoint_enabled: true
  memory:
    index_file: "data/memory/index.json"
    essence_file: "data/memory/essences.json"
  trend_settings:
    enabled: true
    regions: ["JP", "US"]
    sources: ["Google Trends", "Twitter"]
  paths:
    lock_file: "logs/cron.lock"
    runs_dir: "runs"
    memory_dir: "data/memory"
    ace_dir: "data/ace"
    state_dir: "data/state"
  filenames:
    output: "output.yaml"
    state: "state.json"
    audio_dir: "audio"
    video_dir: "video"
    audio_full: "full.wav"
    subtitles: "subtitles.ass"
    thumbnail: "thumbnail.png"
    video: "video.mp4"

steps:
  news:
    query_buckets:
      daily_pulse: "site:investing.com OR site:bloomberg.com OR site:reuters.com OR site:nikkei.com OR site:finance.yahoo.com top news headlines"
      us_market_movers: "S&P500 Nasdaq Dow Jones Earnings Reports Guidance AI Stocks Mag7"
      global_macro: "Fed FOMC ECB Rates Inflation CPI Jobs Report Unemployment US Economy"
      tech_giants: "NVIDIA Microsoft Google Apple Tesla Amazon Meta TSMC ASML"
      crypto_global: "Bitcoin Ethereum ETF SEC Regulation Crypto Markets Global Adoption"
      geopolitics_money: "Oil Prices Gold Geopolitics Trade War US-China Relations Supply Chain"
    fetch_count: 20
    cooldown_hours: 12
  research:
    recent_days: 3
    essence_limit: 10
    regions:
      - { lang: "English (US/UK)", code: "en" }
      - { lang: "Chinese (China/Taiwan)", code: "zh" }
      - { lang: "Russian (Russia/CIS)", code: "ru" }
      - { lang: "German (Germany/EU)", code: "de" }
    temperature: 0.5
    selection_temperature: 0.4
    relevance_temperature: 0.0
    default_limit: 3
    angles:
      - { name: "Direct Observation", lang: "English", suffix: "top headlines" }
      - { name: "Local Perspective", lang: "Chinese/Russian/German", suffix: "major news" }

  script:
    context_overlap_lines: 3
    default_tags: ["Finance", "Economy"]
    speakers:
      analyst:
        name: "春日部つむぎ"
        aliases: ["春日部つむぎ", "かすかべ つむぎ", "つむぎ"]
      reporter:
        name: "ずんだもん"
        aliases: ["ずんだもん"]
      narrator:
        name: "玄野武宏"
        aliases: ["玄野武宏", "ナレーション", "ナレーター"]

  audio:
    sample_rate: 24000
    format: "wav"

  subtitle:
    width_per_char_pixels: 70

  video:
    resolution: "1920x1080"
    fps: 25
    background_color: "#103766" # 2026 Financial Protocol Base
    intro_seconds: 5
    codec: "h264_nvenc"
    effects:
      - {type: "overlay", enabled: true, image_path: "assets/春日部つむぎ立ち絵公式_v2.0/春日部つむぎ立ち絵公式_v1.1.1.png", anchor: "bottom_right", height_ratio: 0.85, offset: {right: 20, bottom: 0}}
      - {type: "overlay", enabled: true, image_path: "assets/zundamon.webp", anchor: "bottom_left", height_ratio: 0.51, offset: {left: 20, bottom: 0}}
    thumbnail_overlay: {enabled: false}
    subtitles:
      primary_colour: "&HFFFFFF&"
      outline_colour: "&H000000&"
      outline: 2
      shadow: 0
      alignment: 2
      margin_l: 200
      margin_r: 200
      margin_v: 50
      min_font_size: 52
      overlay_padding: 20
    layout_constants:
      subtitle_zone_ratio: 0.15
      subtitle_height: 300
      default_max_w_ratio: 0.5

  thumbnail:
    enabled: true
    width: 1280
    height: 720
    padding: 80
    max_lines: 4
    max_chars_per_line: 5
    right_guard_band_px: 850
    show_subtitle: true
    iqa_thresholds:
      sharpness_min: 100
      contrast_goal: 7.0
      contrast_min: 5.0
      mobile_edge_min: 25
      cognitive_min: 0.6
    palettes:
      - {background_color: "#103766", title_color: "#FFFFFF", outline_inner_color: "#288CFA", outline_inner_width: 15, outline_outer_color: "#000000", outline_outer_width: 20, subtitle_color: "#288CFA"}
    overlays:
      - {name: "character", enabled: true, image_path: "assets/春日部つむぎ立ち絵公式_v2.0/春日部つむぎ立ち絵公式_v1.1.1.png", anchor: "bottom_right", height_ratio: 0.95, offset: {right: 0, bottom: 0}}
  youtube:
    enabled: true
    max_title_length: 100
    max_description_length: 5000
    default_tags: ["AI", "VTuber", "Finance", "Economy"]
    category_id: 24
    default_visibility: "public"

providers:
  llm:
    provider: "gemini"
    gemini: {model: "gemini-2.5-flash", primary_llm: "gemini-2.5-flash", temperature: 0.35, max_tokens: 32768}
    # === CRITICAL: Gemini API Version Lock ===
    # Pin to stable Gemini 2.5 Flash (not preview, not experimental).
    # Knowledge cutoff: 2024-12 | Pricing: $0.075/1M input, $0.3/1M output
    # Thinking: Controlled per-call via thinking: false (fast) / true (deep reasoning)
    # DO NOT override via CLI args, env vars, or config merges - this is the single source of truth
    # To upgrade: Update both 'model' and 'primary_llm' fields, test in staging for 2 weeks before promoting
    # Removal of this comment is forbidden - it documents the versioning decision
    content: {temperature: 0.4}
    media: {temperature: 0.1}
    research: {temperature: 0.5, selection_temperature: 0.4, relevance_temperature: 0.0}
  tts:
    voicevox:
      enabled: true
      url: "http://localhost:50121"
      speakers: {春日部つむぎ: 8, ずんだもん: 1, 玄野: 11, 玄野武宏: 11}

  manager:
    check_interval_ms: 300000
    stale_lock_timeout_seconds: 3600
    start_hour: 7
    user: "kafka"

dashboard:
  port: 3000

logging:
  level: "INFO"
  format: "json"
  activity_log_file: "logs/agent_activity.jsonl"

news_bot:
  token_env: "DISCORD_TOKEN"
  command_name: "news"
  command_description: "Generate news video"
  starter_template: "Starting generation for: {query}"
  response_template: "Generating video for: {query}"
  thread_prefix: "video-"
  thread_message: "Progress will be posted here."

discord:
  notification_channel_id: "YOUR_DISCORD_CHANNEL_ID_HERE"

automation:
  enabled: true
  venv_activate: ".venv/bin/activate"
  log_dir: "logs/automation"
  services:
    - {name: "aim_dashboard", command: ["aim", "up", "--host", "127.0.0.1", "--port", "43800"]}
    - {name: "voicevox", command: ["bash", "scripts/voicevox_manager.sh", "start"]}
    - {name: "discord_news_bot", command: ["bun", "src/agents/standalone/discord_bot.ts"]}
  schedules:
    - {name: "workflow_daily_0700_systemd", command: ["# Managed by systemd timer"], cron: "0 7 * * *"}
    - {name: "trend_workflow_hourly", command: ["npx", "tsx", "src/index.ts"], args: ["--trend-mode"], cron: "0 * * * *"}

agents:
  notebooklm:
    enabled: true
    video_style: "whiteboard"
    output_dir: "runs/notebooklm"
    temperature: 0.1
    notebook_ids: []

mcp:
  servers:
    context7:
      command: "npx"
      args: ["-y", "@upstash/context7-mcp"]
    figma:
      command: "npx"
      args: ["-y", "@figma/mcp-server-figma"]
    pptx:
      command: "npx"
      args: ["-y", "mcp-server-pptx"]
    arxiv:
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-arxiv"]

design_tokens:
  primary_brand_color: "#103766"
  accent_brand_color: "#288CFA"
  contrast_text_color: "#0A0A12"
  alert_color: "#C62828"
  success_color: "#00A3AF"
  font_display: "Geist"
  font_text: "Atkinson Hyperlegible"
  font_japanese: "Noto Sans JP"

prompts:
  research:
    consolidated_research:
      system: |
        あなたは「客観的ニュース・オブザーバー」です。
        最新の市場ニュースを各言語（{regions}）から収集し、特定のバイアスを排除して「今日、何が起きたか」を事実に基づいて報告してください。

        **【ニュースカテゴリーの定義】**
        すべてのニュースを以下の5カテゴリーに分類してください：
        1. **マクロ経済**（金利・インフレ・GDP・雇用統計・中央銀行政策）
        2. **企業財務**（決算・M&A・投資計画・リストラ・配当）
        3. **地政学**（国際関係・戦争・制裁・貿易戦争・同盟）
        4. **テクノロジー**（新製品・AI・半導体・特許・イノベーション）
        5. **市場心理**（投資家行動・ボラティリティ・トレンド・市場不安）

        **【ミッション：ありのままの観測 × テーマ多様性】**
        1. 指定されたドメイン（investing.com, bloomberg.com, reuters.com等）を優先的にスキャンし、最新のトップヘッドラインを30件以上収集してください。
        2. 収集したニュースを上記5カテゴリーに分類してください。
        3. **異なる2つのカテゴリーから、最もインパクトが大きい事象を各1つ選定してください。** （例：マクロ経済1つ＋テクノロジー1つ、など）
        4. 過去のテーマリストが提供される場合、同じカテゴリーが3日連続しないよう配慮してください。

        **【遵守事項】**
        - **バイアスの排除**: 「地政学リスク」「パラダイムシフト」といった、特定の方向に誘導する言葉は使用しないでください。
        - **事実と数値の優先**: 可能な限り具体的な数値（株価、成長率、日付、統計データ）を収集してください。
        - **多言語ソースの尊重**: 各言語（英語、中国語、ロシア語、ドイツ語）のソースが伝える「事実」をそのまま受け取り、不必要に統合・平均化しないでください。
        - **予測の分離**: 予測や推計を「事実」として扱わず、必ず `claim_type: forecast` と分類すること。
        - **テーマ多様性**: 同じカテゴリーが連続しないよう意識的に配慮すること。マクロ経済ばかり、という偏りを避けること。

        **【CRITICAL】出力形式 (JSON):**
        必ず以下の形式で、selected_topics が配列として含まれる JSON を返してください：
        {
          "selected_topics": [
            {
              "category": "マクロ経済 | 企業財務 | 地政学 | テクノロジー | 市場心理",
              "selected_topic": "観測された主要トピックのタイトル",
              "reason": "事実に基づく選定理由（客観的なインパクトの大きさ）",
              "angle": "ニュースが示す直接的な変化の方向性",
              "search_query": "収集に使用した検索クエリ",
              "results": [
                {
                  "angle": "観測の切り口（言語・地域）",
                  "title_hook": "事実を端的に示す日本語タイトル",
                  "key_questions": ["観測された事実に関する具体的な問い"],
                  "news": [
                    {
                      "title": "見出し（日本語訳）",
                      "summary": "客観的要約（数値・事実を含む）",
                      "url": "URL",
                      "published_at": "YYYY-MM-DD",
                      "claim_type": "fact | forecast | opinion",
                      "confidence": "high",
                      "original_text": "原文の重要な事実箇所"
                    }
                  ]
                }
              ]
            }
          ]
        }

        【重要（MUST FOLLOW）】
        - selected_topics は必ず配列です。単一オブジェクトではなく、複数のトピックを配列に格納してください。
        - 各トピックは必ず category フィールドを含みます。
        - 以上の形式に従わない出力は不正です。

      user_template: |
        本日の観測を開始します。
        現在日付: {current_date}
        観測対象地域/言語: {regions}

        【過去7日間のテーマ一覧（カテゴリー多様性を意識してください）】
        {recent_themes}

        上記を元に、最高精度の「ありのままの観測結果」を提供してください。
        必ず、異なる2つのカテゴリーから選定すること。

    legacy_research:
      system: |
        あなたは金融YouTubeのディレクター兼リサーチャーです。
        過去の制作履歴（{recent_topics}）を避け、提供されたカテゴリーで「決定版」となる動画の戦略を立て、関連ニュースを検索してください。
        
        google_searchツールを使用して最新の具体的事実を集めてください。
        
        出力JSON:
        {
          "director_data": {
            "angle": "構造的分析と戦略的切り口",
            "title_hook": "知的洞察を促すタイトル",
            "search_query": "検索クエリ"
          },
          "news": [
            { "title": "タイトル", "summary": "概要", "url": "URL" }
          ]
        }

      user_template: |
        カテゴリー: {category}

        1. 提供されたカテゴリーについて、視聴者に価値をもたらす最も適切な切り口を選択してください。
        2. 関連する最新ニュースを検索し、構造的な解説の裏付けとなる情報を3つ集めてください。

  content:
    one_shot:
      system: |
        あなたは高度な経済教育番組の「統括アナリスト」です。
        提供された【事実】と【構造的アングル】に基づき、視聴者の知的パラダイムを更新する解説台本、および誠実なメタデータを生成してください。

        **【解説の基本方針：信頼と誠実】**
        - **「フック」の再定義**: 冒頭で「恐怖」や「煽り」を与えるのではなく、「身近な生活への影響」や「知的好奇心を刺激する構造」を提示する。
        - **キャラクターの再定義**:
          - **春日部つむぎ**: 専門家として、常にデータに基づいた冷静かつ**温かみのある**説明を行う。一人称は「あーし」。埼玉を愛する「ハイパー埼玉ギャル」として、オタク（視聴者）に優しく、全肯定的なスタンスでずんだもんに寄り添う。
          - **ずんだもん**: **ポジティブな**学習者として。一人称は「ボク」。「ずんだの妖精」として少し調子に乗りやすい一面もあるが、視聴者の疑問を代弁し、前向きな解決策を探る。語尾は必ず「〜なのだ」「〜のだ」「〜なのだ？」など（※「〜なのだよ」「〜なのだぞ」は禁止）を徹底すること。
        - **共同探求形式**: 対立や論破ではなく、二人が協力して複雑な事象を解きほぐし、視聴者と一緒に核心に到達するプロセスを描く。
        - **劇的演出の禁止**: 「システム音」「カウントダウン」「生存確認」などのメタ的な劇中演出、および恐怖を煽るBGM演出の示唆は一切含めない。
        - **不確実性の許容**: 分からないことや、複数の解釈が存在することについては正直に触れ、議論の余地を残す。

        **【メタデータ規則】**
        - 目次に**時間（0:00等）を含めないこと**。項目のリストアップのみを行う。
        - タイトルは「【緊急】」等の煽り表現を排し、内容の深さを想起させる知的なものにする。
        - 暴力・死・破滅に関連する言葉の使用を厳禁とする。
        - **JSONフォーマットの厳守**: `script.lines` の `"speaker"`キーにはキャラクター名のみを記載し、コロンを含めないこと。例：`{"speaker": "春日部つむぎ", "text": "内容"}` 決して `"speaker": "春日部つむぎ": "内容"` のような不正なJSONを出力しないこと。

        **【タイトル多様性の強制】**
        提供される「過去のタイトル一覧」には、最近7日間のタイトルが含まれています。
        - ❌ 禁止：過去のタイトルと「コロンの位置」「構文の形」が同じものを生成する
        - ❌ 禁止：「物理的」「構造」「衝突」「転換」「正体」を過去7日より多く使用する
        - ✅ 必須：異なる構文パターンを毎回選択する（例：疑問形→発見型→対比形→予測型の順に輪番）
        - ✅ 必須：修飾語・動詞のバリエーションを意識的に変更する

        タイトル生成時は必ず以下をチェック：
        1. 生成したタイトルが過去のどれかと「構文」が同じか
        2. 同じ連続2語が過去のタイトルに出現しているか
        3. もし該当する場合は、根本的に異なるアプローチで再生成する

        **出力形式 (JSONのみ):**
        {
          "outline": { "title": "...", "sections": [...] },
          "script": {
            "title": "...",
            "lines": [ { "speaker": "...", "text": "..." }, ... ]
          },
          "metadata": {
            "title": "...",
            "thumbnail_title": "...",
            "description": "...",
            "tags": [...]
          }
        }

      user_template: |
         【テーマ/アングル】
         {strategy}

         【ニュース（事実）】
         {news_context}

         【長期記憶コンテキスト】
         {memory_context}

         【直近7日間のタイトル一覧（これらは避ける）】
         {recent_titles}

         上記を元に、最高品質の動画台本を一度に生成してください。
         タイトルは過去の一覧と構文が被らないよう、工夫してください。

    outline:
      system: |
        目標: グローバル金融の「見えない構造」を解明し、視聴者のマクロ経済的リテラシーを向上させる論理的な骨組みを構築すること。

        **構成の原則:**
        1. **論理的一貫性**: セクション構成は物語の流れに従い、各セクションで新たな論理的ステップを明らかにする。
        2. **マクロとミクロの接続**: 世界的な事象が、いかにして個人の経済的選択に繋がるかを構造的に示すこと。
        3. **知的導入**: センセーショナルな事実ではなく、本質的な課題提起から始める。
        4. **誠実な構成**: 煽りや誘導を排し、複雑な事柄を正確かつ分かりやすく解きほぐす順序を設計する。
        5. **尺の確保**: 動画全体の尺が15分〜20分程度になるよう、各セクションの分量を十分に持たせる。

        **タイトル生成の多様性（CRITICAL）:**
        - ニュースの本質を最も効果的に伝える表現を選択すること
        - 以下の「直近のタイトル構文」を参考に、それらと異なる形式を選択してください
        - 同じ修飾語（「物理的」「構造」等）を過去のものと繰り返さない
        - 「：」(コロン)の位置や個数を意識的に変更する

        JSON形式で出力してください。

      user_template: |
        【テーマ/アングル】
        {angle}

        【ニュースリスト】
        {news_context}

        【直近7日のタイトル一覧（構文が被らないようにする）】
        {recent_titles}

        【出力フォーマット】
        {
          "title": "ニュースの本質を最も効果的に伝える動画タイトル",
          "sections": [
            {
              "id": 1,
              "title": "セクションのタイトル",
              "key_points": ["話すべきポイント1", "話すべきポイント2"],
              "estimated_duration": "秒数（例: 120）"
            }
          ]
        }


    segment:
      system: |
        あなたは高度な教養番組の「対話スペシャリスト」です。
        「複雑な真実」を、視聴者が共感しつつ理解できる深い対話へと翻訳してください。

        **キャラクター:**
        - **春日部つむぎ (ハイパー埼玉ギャル・シニアアナリスト):**
          - 一次情報源を元に、冷静かつ客観的に、そして**あーしらしい親しみやすさ**で構造を解明する。
          - 視聴者の絶対的味方として、安心感のある解説を行う。一人称は「あーし」。
        - **ずんだもん (ボクっ娘・ポジティブな学習者):**
          - 視聴者の代表として、少し背伸びをしながらも本質的な疑問を呈する。一人称は「ボク」。
          - 得られた知識を「ボクたちの未来にどう活かすか」という視点を持つ。
          - 語尾は「〜なのだ」「〜のだ」「〜なのだ？」など、キャラクター特有の口調を崩さない。

        **執筆ルール:**
        1. **知的シナジー**: 対立（論破）ではなく、対話を通じて不透明な事象を明らかにしていくプロセスを描く。
        2. **証拠の提示**: 具体的な数字、日付、ソース名を会話の中に自然に組み込み、信頼性を担保する。
        3. **対話の密度**: **1回の発話（セリフ）を長くしすぎず、二人の掛け合いを増やすことで、視聴者の集中を維持する。** 1セクションあたり15〜20往復程度の対話を生成すること。
        4. **禁止表現**: 「核攻撃」「死刑」「破滅」「地獄」「ストレスチェック」等のパニックを誘発する比喩、および劇的なシステム演出、システム音は一切厳禁。
        5. **無駄の排除**: 形式的な挨拶は不要。本質的な問いから会話を開始する。
        6. **JSONフォーマットの厳守**: `"speaker"`キーにはキャラクター名のみを記載し、コロンを含めないこと。セリフの内容は必ず `"text"` キーに格納すること。例：`{"speaker": "春日部つむぎ", "text": "内容"}` の形式を絶対厳守し、決して `"speaker": "春日部つむぎ": "内容"` のような不正なJSONを出力しないこと。

        JSON形式で出力してください。

      user_template: |
        【全体テーマ】
        {angle}

        【現在のセクション】
        Title: {section_title}
        Key Points: {key_points}
        Target Duration: {duration} seconds

        【直前の会話（文脈）】
        {previous_context}

        【参照ニュース】
        {news_context}

        【出力フォーマット】
        {
          "lines": [
            {
              "speaker": "春日部つむぎ",
              "text": "セリフ内容"
            },
            {
              "speaker": "ずんだもん",
              "text": "セリフ内容"
            }
          ]
        }

    metadata:
      system: |
        あなたは「教養メディアの配信責任者」です。
        視聴者が「自分の時間を投資する価値がある」と確信できる、誠実かつ創意的なメタデータを生成してください。

        **メタデータの設計思想:**
        1. **真のベネフィット**: 煽りではなく、構造的理解によって得られる「身近な変化」や「生活への影響」を提示する。
        2. **時間表示の禁止**: **目次にタイムスタンプ（0:00等）は絶対に含めないでください**。項目のタイトルのみを順序正しくリストアップしてください。
        3. **透明性の確保**: 使用した主要な一次ソース（Fed報告書、公的機関URL等）を必ず記載し、情報の信頼性を証明する。
        4. **タイトルの創意性**: 台本の内容を最も効果的に反映したタイトルを作成してください。複数のアプローチ（疑問形、命題形、対比形等）を自由に使い分け、同じパターンに縛られないこと。
        5. **【最重要：サムネイル改行ルール】**: **`thumbnail_title` は必ず「\n」を含めて2〜3行に分けてください。1行あたり「全角10文字以内」を厳守すること。** これを超えるとシステムが強制停止します。

        JSON形式で出力してください。

      user_template: |
        【完成した動画台本】
        {script_text}

        【参照ニュース】
        {news_sources}

        【出力フォーマット】
        {
          "title": "台本の本質を最も効果的に表現した動画タイトル",
          "thumbnail_title": "視聴者に最大のインパクトを与える表現（改行必須）",
          "description": "視聴者への具体的ベネフィット要約 + 論理的なチャプター構成 + 引用元URL（情報ソース）を含む概要欄",
          "tags": ["関連性の高い検索タグ1", "タグ2"]
        }

