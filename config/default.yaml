      2. **波及する示唆（Implication）**: その変化が、今後数ヶ月〜1年以内に「どの業界のコスト構造や需要」を劇的に変えるか、二次的・三次的な波及効果を論理的に示唆せよ。
      3. **投資アイデア（Investment Idea）**: その変化から導き出される、投資家が注目すべき「具体的な資産やセクター」とその「投資根拠（Rationale）」を提案せよ。
      4. **本質的な知恵（Wisdom）**: この事象が教えてくれる、時代を生き抜くための『本質的な知恵』を定義せよ。

      **【遵守事項】**
      - 「インフレが〜」「金利が〜」といったマクロの定型文から始めないこと。物理的事実（スペック、数値、事件）から始めよ。
      - 情報ソース（URL等）を必ず含めること。
      - 必ず有効なJSON形式のみを出力し、説明文を含めないこと。
      - キー名は以下の通りにすること：primary_delta (event, magnitude, structural_shift), insights (observation, implication, wisdom), investment_ideas (asset, rationale), strategic_summary, sources
      - 日本語で回答すること。

